<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script>window.API_HOST = 'https://gerador-de-contrato-6uck.onrender.com';</script>
  <title>Cadastro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="login-box">
      <h2>Cadastro</h2>

      <div id="message" class="message hidden"></div>

      <form id="registerForm">
        <div class="form-group full">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Digite seu email" required />
        </div>

        <div class="form-group full">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Nome completo" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" placeholder="000.000.000-00" />
          </div>
          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input type="text" id="telefone" placeholder="(00) 00000-0000" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="nacionalidade">Nacionalidade</label>
            <input type="text" id="nacionalidade"  placeholder="Brasileiro(a)" />
          </div>
          <div class="form-group">
            <label for="profissao">Profissão</label>
            <input type="text" id="profissao" />
          </div>
        </div>

        <div class="form-group">
          <label for="estado_civil">Estado Civil</label>
          <select id="estado_civil">
            <option value="">Selecione</option>
            <option value="Solteiro(a)">Solteiro(a)</option>
            <option value="Casado(a)">Casado(a)</option>
            <option value="União Estável">União Estável</option>
            <option value="Divorciado(a)">Divorciado(a)</option>
            <option value="Viúvo(a)">Viúvo(a)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cep">CEP</label>
          <input type="text" id="cep" />
        </div>
        <div class="form-group">
          <label for="rua">Rua</label>
          <input type="text" id="rua" />
        </div>
        <div class="form-group">
          <label for="numero">Número</label>
          <input type="text" id="numero" />
        </div>
        <div class="form-group">
          <label for="complemento">Complemento</label>
          <input type="text" id="complemento" placeholder="Apartamento, bloco, casa..." />
        </div>
        <div class="form-group">
          <label for="bairro">Bairro</label>
          <input type="text" id="bairro" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="cidade">Cidade</label>
            <input type="text" id="cidade" />
          </div>
          <div class="form-group">
            <label for="estado">Estado (UF)</label>
            <input type="text" id="estado" maxlength="2" />
          </div>
        </div>

        <div class="form-group full">
          <label for="password">Senha</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Crie uma senha" required />
            <span class="toggle-password" onclick="togglePassword('password')"></span>
          </div>
        </div>
        <div class="form-group full">
          <label for="confirm">Confirmar Senha</label>
          <div class="password-wrapper">
            <input type="password" id="confirm" placeholder="Repita a senha" required />
            <span class="toggle-password" onclick="togglePassword('confirm')"></span>
          </div>
        </div>
        <div id="strength" class="strength-bar"></div>
        <button type="submit" class="btn-login">Cadastrar</button>
        <p class="register-link">Já tem conta? <a href="../../pages/Login/index.html">Fazer login</a></p>
      </form>
    </div>
  </div>

  <script src="../../services/cpf.js"></script>
  <script src="../../services/telefone.js"></script>
  <script src="../../services/cep.js"></script>
  <script src="../../services/auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
