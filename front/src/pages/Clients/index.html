<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>window.API_HOST = 'https://gerador-de-contrato-6uck.onrender.com';</script>
    <title>Cadastrar Cliente - Gerador de Contrato</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="form-box">
        <header>
          <a href="../Home/index.html" class="btn-back">⬅ Voltar</a>
          <h2>Cadastro de Cliente</h2>
          <p>Preencha os dados do locador ou locatário.</p>
        </header>

        <form id="clientForm">
          <div class="input-group">
            <label for="nome">Nome Completo / Razão Social</label>
            <input
              type="text"
              id="nome"
              name="nome"
              placeholder="Ex: João Silva"
              required
            />
          </div>

          <div class="input-row">
            <div class="input-group">
              <label for="nacionalidade">Nacionalidade</label>
              <input type="text" id="nacionalidade" name="nacionalidade" placeholder="Brasileiro(a)" />
            </div>
            <div class="input-group">
              <label for="profissao">Profissão</label>
              <input type="text" id="profissao" name="profissao" placeholder="Ex: Empresário" />
            </div>
            <div class="input-group input-group--uf">
              <label for="estado_civil">Estado Civil</label>
              <select id="estado_civil" name="estado_civil">
                <option value="">Selecione</option>
                <option value="Solteiro(a)">Solteiro(a)</option>
                <option value="Casado(a)">Casado(a)</option>
                <option value="Divorciado(a)">Divorciado(a)</option>
                <option value="Viúvo(a)">Viúvo(a)</option>
              </select>
            </div>
          </div>

          <div class="input-row">
            <div class="input-group">
              <label for="cpf">CPF ou CNPJ</label>
              <input
                type="text"
                id="cpf"
                name="cpf"
                placeholder="000.000.000-00"
                required
              />
            </div>
            
          </div>

          <div class="input-row">
            <div class="input-group">
              <label for="orgao_expedidor">Órgão Expedidor</label>
              <input
                type="text"
                id="orgao_expedidor"
                name="orgao_expedidor"
                placeholder="SSP"
              />
            </div>
            <div class="input-group">
              <label for="telefone">Telefone</label>
              <input
                type="tel"
                id="telefone"
                name="telefone"
                placeholder="(19) 99999-9999"
              />
            </div>
          </div>

          <div class="input-group">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="cliente@email.com"
            />
          </div>

          <div class="input-row cols-3">
            <div class="input-group">
              <label for="rua">Rua / Av</label>
              <input type="text" id="rua" name="rua" placeholder="Rua das Flores" />
            </div>
            <div class="input-group">
              <label for="numero">Número</label>
              <input type="text" id="numero" name="numero" placeholder="123" />
            </div>
            <div class="input-group">
              <label for="bairro">Bairro</label>
              <input type="text" id="bairro" name="bairro" placeholder="Centro" />
            </div>
          </div>

          <div class="input-row cols-3">
            <div class="input-group">
              <label for="cep">CEP</label>
              <input type="text" id="cep" name="cep" placeholder="00000-000" />
            </div>
            <div class="input-group">
              <label for="cidade">Cidade</label>
              <input type="text" id="cidade" name="cidade" placeholder="São Paulo" />
            </div>
            <div class="input-group input-group--uf">
              <label for="estado">Estado (UF)</label>
              <select id="estado" name="estado">
                <option value="">Selecione</option>
                <option value="AC">AC</option>
                <option value="AL">AL</option>
                <option value="AP">AP</option>
                <option value="AM">AM</option>
                <option value="BA">BA</option>
                <option value="CE">CE</option>
                <option value="DF">DF</option>
                <option value="ES">ES</option>
                <option value="GO">GO</option>
                <option value="MA">MA</option>
                <option value="MT">MT</option>
                <option value="MS">MS</option>
                <option value="MG">MG</option>
                <option value="PA">PA</option>
                <option value="PB">PB</option>
                <option value="PR">PR</option>
                <option value="PE">PE</option>
                <option value="PI">PI</option>
                <option value="RJ">RJ</option>
                <option value="RN">RN</option>
                <option value="RS">RS</option>
                <option value="RO">RO</option>
                <option value="RR">RR</option>
                <option value="SC">SC</option>
                <option value="SP">SP</option>
                <option value="SE">SE</option>
                <option value="TO">TO</option>
              </select>
            </div>
          </div>

          <button type="submit" class="btn-save">Salvar Cliente</button>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
