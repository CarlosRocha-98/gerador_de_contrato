<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>window.API_HOST = 'https://gerador-de-contrato-6uck.onrender.com';</script>
    <title>Dashboard - Gerador de Contratos</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="container">
      
      <div class="dashboard-box">
        <header class="dash-header">
          <h2>Bem-vindo!</h2>
          <div id="userInfo"></div>
          <p id="welcome-msg">Carregando informações...</p>
        </header>

        <div class="menu-grid">
          <div class="menu-row">
            <button
              class="menu-card"
              onclick="window.location.href = '../ContractType/index.html'"
            >
              <span class="icon">📄</span>
              <span>Gerar Contrato</span>
            </button>

            <button
              class="menu-card"
              onclick="window.location.href = '../Clients/index.html'"
            >
              <span class="icon">👥</span>
              <span>Cadastrar Clientes</span>
            </button>

            <button
              class="menu-card"
              onclick="window.location.href = '../Properties/index.html'"
            >
              <span class="icon">🏠</span>
              <span>Cadastrar Imóveis</span>
            </button>
          </div>

          <div class="menu-row">
            <button
              class="menu-card"
              onclick="window.location.href = '../Documents/index.html'"
            >
              <span class="icon">📊</span>
              <span>Meus Contratos</span>
            </button>

            <button
              class="menu-card"
              onclick="window.location.href = '../Profile/index.html'"
            >
              <span class="icon">👤</span>
              <span>Meu Perfil</span>
            </button>
          </div>
        </div>

        <button class="btn-logout" onclick="logout()">
          🚪 Sair do Sistema
        </button>
      </div>
    </div>

    <script src="../../services/auth.js"></script>
    <script src="script.js"></script>
  </body>
</html>
