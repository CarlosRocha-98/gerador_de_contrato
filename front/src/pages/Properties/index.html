<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>window.API_HOST = 'https://gerador-de-contrato-6uck.onrender.com';</script>
    <title>Registrar Imóvel - Gerador de Contrato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-box">
            <header>
                <a href="../Home/index.html" class="btn-back">⬅ Voltar</a>
                <h2>Registrar Imóvel</h2>
                <p>Preencha os dados do imóvel para o contrato.</p>
            </header>

            <form id="propertyForm">
                <div class="section-title">Dados do Imóvel</div>
                
                <div class="input-group">
                    <label for="imovel-cadastro-cep">CEP</label>
                    <input type="text" id="imovel-cadastro-cep" placeholder="00000-000">
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="endereco">Rua</label>
                        <input type="text" id="endereco" placeholder="Ex: Rua das Palmeiras" required>
                    </div>
                    <div class="input-group">
                        <label for="numero">Número</label>
                        <input type="text" id="numero" placeholder="789" required>
                    </div>
                    <div class="input-group">
                        <label for="complemento">Complemento</label>
                        <input type="text" id="complemento" placeholder="Apartamento, bloco...">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="bairro">Bairro</label>
                        <input type="text" id="bairro" placeholder="Vila Nova" required>
                    </div>
                    <div class="input-group">
                        <label for="cidade">Cidade</label>
                        <input type="text" id="cidade" placeholder="São Paulo" required>
                    </div>

                    <div class="input-group">
                        <label for="estado">Estado (UF)</label>
                        <select id="estado" class="input-field" required>
                            <option value="">Selecione</option>
                            <option value="AC">AC</option>
                            <option value="AL">AL</option>
                            <option value="AP">AP</option>
                            <option value="AM">AM</option>
                            <option value="BA">BA</option>
                            <option value="CE">CE</option>
                            <option value="DF">DF</option>
                            <option value="ES">ES</option>
                            <option value="GO">GO</option>
                            <option value="MA">MA</option>
                            <option value="MT">MT</option>
                            <option value="MS">MS</option>
                            <option value="MG">MG</option>
                            <option value="PA">PA</option>
                            <option value="PB">PB</option>
                            <option value="PR">PR</option>
                            <option value="PE">PE</option>
                            <option value="PI">PI</option>
                            <option value="RJ">RJ</option>
                            <option value="RN">RN</option>
                            <option value="RS">RS</option>
                            <option value="RO">RO</option>
                            <option value="RR">RR</option>
                            <option value="SC">SC</option>
                            <option value="SP">SP</option>
                            <option value="SE">SE</option>
                            <option value="TO">TO</option>
                        </select>
                    </div>
                </div>

                <div class="input-group">
                    <label for="tipo">Tipo de Imóvel</label>
                    <select id="tipo" name="tipo" class="input-field" required>
                        <option value="" disabled selected>Selecione o tipo...</option>
                        <option value="apartamento">Apartamento</option>
                        <option value="casa">Casa</option>
                        <option value="comercial">Comercial</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="caracteristicas">Características do imóvel</label>
                    <textarea id="caracteristicas" rows="4" placeholder="Ex: Apartamento com 2 quartos, 1 banheiro, sala, cozinha..."></textarea>
                </div>

                <button type="submit" class="btn-save">Salvar Imóvel</button>
            </form>
        </div>
    </div>

    <script src="../../services/cep.js"></script>
    <script src="script.js"></script>
</body>
</html>
